# ============================================================
# CI Pipeline — runs on every push and pull request.
#
# Three jobs:
#   1. lint    — checks code style and catches common bugs
#   2. test    — runs the full pytest test suite
#   3. build   — verifies the Docker image builds successfully
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Linting (code quality) ──────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install ruff

      - name: Run ruff (fast Python linter)
        run: ruff check app/ tests/
        working-directory: hyperlocal-network-design

  # ── Tests ───────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: hyperlocal-network-design/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: hyperlocal-network-design

      - name: Run tests
        run: pytest tests/ -v --tb=short
        working-directory: hyperlocal-network-design
        env:
          APP_ENV: testing

  # ── Docker build ────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]           # Only build if lint + test pass
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hyperlocal:ci .
        working-directory: hyperlocal-network-design
